# Provider sidecar for bringup.launch.xml (Phase 40 layout: sits right next
# to the launch file it describes, ships in rt_demo's installed share dir).
# See src/ros-launch-manifest/docs/launch-manifest.md for the format.
#
# Vocabulary v2 (Phase 44.5): every path declares an explicit `trigger:` and
# the three nodes compose into one named chain (`points_to_cmd`) — the
# smallest honest decomposition: sensor_node's `tick` is timer-triggered (a
# clock BOUNDARY, the chain's own source clock), filter_component's `filter`
# and control_node's `control` are both input-triggered (one EVENT SEGMENT,
# drain-toward-sink order control > filter). See
# docs/superpowers/specs/2026-07-17-contract-vocabulary-v2-design.md §1/§4
# and 2026-07-17-chain-aware-mapper-design.md.
version: 1

nodes:
  sensor_node:
    pub:
      points_raw:
        min_rate_hz: 100
    paths:
      tick:
        trigger: { timer: { rate_hz: 100 } }
        output: [points_raw]

  filter_component:
    sub:
      points_raw:
        min_rate_hz: 100
    pub:
      points_filtered:
        min_rate_hz: 100
    paths:
      filter:
        trigger: { input: [points_raw] }
        output: [points_filtered]
        max_latency_ms: 5

  control_node:
    # Phase 41.5: mapper hint, no numbers (design doc §2.1) — informational
    # today (the built-in rate/deadline mappers rank by rate/deadline only),
    # future mappers can weight by this.
    criticality: high
    sub:
      points_filtered:
        min_rate_hz: 100
        max_age_ms: 50
    pub:
      cmd:
        min_rate_hz: 100
    paths:
      control:
        trigger: { input: [points_filtered] }
        output: [cmd]
        max_latency_ms: 10

# Phase 44.5: end-to-end chain composed from the three paths above.
# sampling_cost = tick's period (1000/100 = 10ms; no declared max_latency_ms
# on the boundary path itself, so no extra exec_ms — "no invented WCETs").
# declared event-segment sum = filter's 5ms + control's 10ms = 15ms.
# total = 25ms, comfortably inside the 30ms budget (5ms honest slack) —
# passes `chain-budget` (and `chain-sampling-feasibility`, sampling_cost
# 10ms < 30ms budget) cleanly. See `.superpowers/sdd/p44-w5-report.md` for
# the by-hand chain_aware priority derivation.
chains:
  points_to_cmd:
    semantics: reaction
    max_latency_ms: 30
    segments:
      - { scope: /, path: tick }
      - { via: /perception/points_raw }
      - { scope: /, path: filter }
      - { via: /perception/points_filtered }
      - { scope: /, path: control }

topics:
  # absolute — nodes above sit in different namespaces (/perception, /control)
  /perception/points_raw:
    type: std_msgs/msg/String
    pub: [sensor_node/points_raw]
    sub: [filter_component/points_raw]
    rate_hz: 100

  /perception/points_filtered:
    type: std_msgs/msg/String
    pub: [filter_component/points_filtered]
    sub: [control_node/points_filtered]
    rate_hz: 100

  /control/cmd:
    type: std_msgs/msg/String
    pub: [control_node/cmd]
    rate_hz: 100
