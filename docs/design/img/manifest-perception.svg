<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 320" font-family="system-ui, -apple-system, sans-serif" font-size="13">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#666"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#1a73e8"/>
    </marker>
  </defs>

  <!-- Outer box: scope -->
  <rect x="20" y="10" width="600" height="230" rx="8" fill="#f8f9fa" stroke="#999" stroke-width="1.5"/>
  <text x="30" y="30" font-size="14" font-weight="bold" fill="#333">Manifest for perception.launch.xml</text>
  <text x="30" y="48" font-size="11" fill="#888">(loaded with namespace: /perception)</text>

  <!-- Node: cropbox -->
  <rect x="50" y="70" width="180" height="90" rx="6" fill="#d2e3fc" stroke="#1a73e8" stroke-width="1.5"/>
  <text x="65" y="92" font-weight="600" fill="#1a73e8">cropbox</text>
  <text x="65" y="112" font-size="12" fill="#444">pub: [cropped]</text>
  <text x="65" y="130" font-size="12" fill="#444">sub: [input]</text>

  <!-- Node: centerpoint -->
  <rect x="370" y="70" width="220" height="90" rx="6" fill="#d2e3fc" stroke="#1a73e8" stroke-width="1.5"/>
  <text x="385" y="92" font-weight="600" fill="#1a73e8">centerpoint</text>
  <text x="385" y="112" font-size="12" fill="#444">pub: [objects]</text>
  <text x="385" y="130" font-size="12" fill="#444">sub: [cropped]</text>

  <!-- Arrow: cropbox → centerpoint -->
  <line x1="230" y1="115" x2="362" y2="115" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="270" y="108" font-size="11" fill="#666" font-style="italic">cropped</text>

  <!-- imports label -->
  <text x="95" y="195" font-size="12" font-weight="600" fill="#34a853">imports.raw_data</text>

  <!-- exports label -->
  <text x="420" y="195" font-size="12" font-weight="600" fill="#34a853">exports.detections</text>

  <!-- Arrow: imports → cropbox -->
  <line x1="140" y1="185" x2="140" y2="168" stroke="#1a73e8" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-blue)"/>

  <!-- Arrow: centerpoint → exports -->
  <line x1="480" y1="168" x2="480" y2="185" stroke="#1a73e8" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-blue)"/>

  <!-- Bottom labels -->
  <text x="50" y="260" font-size="12" fill="#888">↑ parent wires via topic</text>
  <text x="380" y="260" font-size="12" fill="#888">↓ parent wires via topic</text>

  <!-- Bottom note -->
  <text x="100" y="300" font-size="12" fill="#666">Topics wire endpoints explicitly. Imports/exports define the scope boundary.</text>
</svg>
